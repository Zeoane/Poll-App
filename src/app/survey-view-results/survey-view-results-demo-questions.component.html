@if (leadWithTemplateQ1) {
<article class="create-q">
  <h2 class="create-q__title">
    <span class="create-q__title-num">1.</span><span class="create-q__title-body">Which date would work best for you?</span>
  </h2>
  <p class="create-q__hint">
    More than one answers are possible.
  </p>
  <ul class="create-q__opts">
    <li>
      <button
        type="button"
        class="create-check create-check--preview"
        [class.create-check--preview-on]="previewQ1Checked.a"
        [attr.aria-pressed]="previewQ1Checked.a"
        (click)="toggleQ1('a')"
      >
        <span class="create-check__box" aria-hidden="true"></span>
        <span class="create-check__text">
          <span class="create-check__letter">A.</span>
          <span class="create-check__body">19.09.2025, Friday</span>
        </span>
      </button>
    </li>
    <li>
      <button
        type="button"
        class="create-check create-check--preview"
        [class.create-check--preview-on]="previewQ1Checked.b"
        [attr.aria-pressed]="previewQ1Checked.b"
        (click)="toggleQ1('b')"
      >
        <span class="create-check__box" aria-hidden="true"></span>
        <span class="create-check__text">
          <span class="create-check__letter">B.</span>
          <span class="create-check__body">10.10.2025, Saturday</span>
        </span>
      </button>
    </li>
    <li>
      <button
        type="button"
        class="create-check create-check--preview"
        [class.create-check--preview-on]="previewQ1Checked.c"
        [attr.aria-pressed]="previewQ1Checked.c"
        (click)="toggleQ1('c')"
      >
        <span class="create-check__box" aria-hidden="true"></span>
        <span class="create-check__text">
          <span class="create-check__letter">C.</span>
          <span class="create-check__body">11.10.2025, Saturday</span>
        </span>
      </button>
    </li>
    <li>
      <button
        type="button"
        class="create-check create-check--preview"
        [class.create-check--preview-on]="previewQ1Checked.d"
        [attr.aria-pressed]="previewQ1Checked.d"
        (click)="toggleQ1('d')"
      >
        <span class="create-check__box" aria-hidden="true"></span>
        <span class="create-check__text">
          <span class="create-check__letter">D.</span>
          <span class="create-check__body">31.10.2025, Friday</span>
        </span>
      </button>
    </li>
  </ul>
</article>
}

<article class="create-q">
  <h2 class="create-q__title"><span class="create-q__title-num">2.</span><span class="create-q__title-body">Choose the activities you prefer</span></h2>
  <div class="create-q__hint create-q__hint--multi-ctrl">
    <button
      type="button"
      class="create-q__hint-multi-btn"
      [class.create-q__hint-multi-btn--on]="q2MultipleEnabled"
      [attr.aria-pressed]="q2MultipleEnabled"
      aria-label="Allow multiple answers for this question"
      (click)="toggleQ2MultipleHint()"
    >
      <span class="create-q__hint-multi-btn__icon" aria-hidden="true"></span>
    </button>
    <span class="create-q__hint-multi-label">Multiple answers are possible.</span>
  </div>
  <ul class="create-q__opts">
    <li>
      <button
        type="button"
        class="create-check create-check--preview"
        [class.create-check--preview-on]="demoPreview.q2.a"
        [attr.aria-pressed]="demoPreview.q2.a"

        </span>

    </li>
    <li>
      <button

    <li>

        [class.create-check--preview-on]="demoPreview.q2.e"
        [attr.aria-pressed]="demoPreview.q2.e"

          <span class="create-check__letter">E.</span>
